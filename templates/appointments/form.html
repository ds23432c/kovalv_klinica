{% extends 'base.html' %}
{% block title %}Новая запись — {{ clinic_name }}{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-7">
      <div class="card-clinic p-4 p-md-5">
        <h2 class="section-title mb-2" style="font-size:1.8rem">{{ title }}</h2>
        <div class="divider-gold" style="margin:0 0 2rem"></div>
        <form method="post">
          {% csrf_token %}
          {% for field in form %}
          <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors.0 }}</div>{% endif %}
          </div>
          {% endfor %}
          <div class="d-flex gap-3 mt-4">
            <button type="submit" class="btn btn-gold px-4">Сохранить</button>
            <a href="{% url 'appointments:list' %}" class="btn btn-outline-gold px-4">Отмена</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
